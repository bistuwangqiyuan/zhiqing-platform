[build]
  command = "npm run build"
  publish = ".next"

# Official Next.js plugin (handles edge middleware, ISR, image optimization).
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  # Surface Netlify build metadata to the runtime so /api/health can echo
  # which commit the live URL is running.
  COMMIT_REF = "$COMMIT_REF"
  BRANCH = "$BRANCH"
  DEPLOY_PRIME_URL = "$DEPLOY_PRIME_URL"

# Cache static images aggressively (matches the previous vercel.json policy).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
