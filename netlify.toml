[build]
  command = "npm run build"
  publish = ".next"

# A Netlify UI build plugin (@netlify/plugin-sitemap) emits an EMPTY static
# sitemap.xml that shadows our Next.js route. force=true makes this rewrite win
# over the static file so /sitemap.xml always serves our 23-URL sitemap.
[[redirects]]
  from = "/sitemap.xml"
  to = "/api/sitemap"
  status = 200
  force = true

# Official Next.js plugin (handles edge middleware, ISR, image optimization).
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  # Surface Netlify build metadata to the runtime so /api/health can echo
  # which commit the live URL is running.
  COMMIT_REF = "$COMMIT_REF"
  BRANCH = "$BRANCH"
  DEPLOY_PRIME_URL = "$DEPLOY_PRIME_URL"

# Cache static images aggressively (matches the previous vercel.json policy).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
